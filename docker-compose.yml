services:
  reuniator:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: reuniator
    restart: unless-stopped
    user: "${UID:-1000}:${GID:-1000}"
    ports:
      - "127.0.0.1:6742:6742"
    volumes:
      - ./dev.db:/app/prisma/dev.db
    environment:
      - NODE_ENV=production
    env_file:
      - .env
